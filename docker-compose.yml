version: '3.8'

# ============================================================
# NeuroLearn IA — Docker Compose
# Base de datos: Supabase PostgreSQL (sa-east-1)
# ============================================================

services:

  # ── Backend principal — FastAPI :8000 ─────────────────────
  # Gestión de bots, chat, credenciales B2B y autenticación
  bot-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: neurolearn-backend
    ports:
      - "8000:8000"
    environment:
      # Supabase — reemplazar con valores reales en producción
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
    networks:
      - neurolearn
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend — React + Vite :5173 ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neurolearn-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - bot-service
    networks:
      - neurolearn

  # ── Auth Service — DEPRECADO ───────────────────────────────
  # Este servicio está desconectado. Ver auth-service/DEPRECATED.md
  # Descomentar SOLO si se decide reactivar en el futuro.
  #
  # auth-service:
  #   build:
  #     context: .
  #     dockerfile: auth-service/Dockerfile
  #   container_name: neurolearn-auth-service
  #   ports:
  #     - "8002:8000"
  #   environment:
  #     - DATABASE_URL=${DATABASE_URL}
  #     - SECRET_KEY=${SECRET_KEY}
  #   networks:
  #     - neurolearn

networks:
  neurolearn:
    driver: bridge